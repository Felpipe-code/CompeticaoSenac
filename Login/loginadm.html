<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Casamento</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 h-screen flex items-center justify-center p-4">

    <div class="bg-slate-100 h-screen flex items-center justify-center p-4">
<div class="bg-indigo-600 p-8 text-white text-center">
 <h2 class="text-2xl font-bold italic">Controle Casamento
 </h2>   
    <p class="text-indigo-100 text-sm mt 2">Acesso Restrito: Administração & Recepção
    </p>
</div>

<form class="p-8 space-y-6">
    <div>
        <label class="block text-sm font-medium text-gray-700">E-mail</label>
        <input type="email" minlength="6" maxlength="30" required class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="seu@email.com">
    </div>
        <div>
        <label class="block text-sm font-medium text-gray-700">Senha</label>
        <input type="password" class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="••••••••">
    </div>

<button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg font-semibold hover:bg-indigo-700 transition shadow-md">
Entrar 

</button>

</form>
    </div>

</body>

</html>
