<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portaria - Check-in de Convidados</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 p-4">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text font-bold text-gray-800">Portaria - Casamento</h1>
    </div>

    <div class="bg-white border p-4 mb-6 flex gap-2">
        <input type="text" placeholder="Nome ou CPF" class="flex-1 border p-2 rounded outline-none focus:border-blue-500">
        <button class="bg-blue-600 text-white px-6 py-2 rounded font-bold uppercase text-sm">Buscar</button>
    </div>

    <div class="bg-white border rounded overflow-hidden">
        <table class="w-full text-left text-sm">
         <thead class="bg-gray-100 border-b">
                    <tr>
                        <th class="p-3">Nome</th>
                        <th class="p-3 text-center">Mesa</th>
                        <th class="p-3 text-right">Ação</th>
                    </tr>
                </thead>
                <tbody class="divide-y">
                    <tr>
                        <td class="p-3">
                            <p class="font-bold">Carlos Eduardo Oliveira</p>
                            <p class="text-xs text-gray-500">CPF: 123.456.789-00</p>
                        </td>
                        <td class="p-3 text-center font-mono">08</td>
                        <td class="p-3 text-right">
                            <button class="bg-green-600 text-white px-3 py-1 rounded text-xs font-bold">CHECK-IN</button>
                        </td>
                    </tr>
                                        <tr>
                        <td class="p-3">
                            <p class="font-bold">Feijao Com Farinha</p>
                            <p class="text-xs text-gray-500">CPF: 697.678.789-00</p>
                        </td>
                        <td class="p-3 text-center font-mono">16</td>
                        <td class="p-3 text-right">
                            <button class="bg-green-600 text-white px-3 py-1 rounded text-xs font-bold">CHECK-IN</button>
                        </td>
                    </tr>

                    <tr class="bg-gray-50">
                        <td class="p-3">
                            <p class="font-bold">Ana Beatriz Souza</p>
                            <p class="text-xs text-gray-500">CPF: 987.654.321-11</p>
                        </td>
                        <td class="p-3 text-center font-mono">02</td>
                        <td class="p-3 text-right">
                            <span class="text-gray-400 text-xs italic">Já entrou</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>


</body>
</html>
